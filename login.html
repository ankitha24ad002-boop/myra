<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Myra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#f8e1f4,#fce4ec);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg,#d4af37,#f7e7ce);
  cursor: pointer;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter email">
  <input type="password" id="password" placeholder="Enter password">

  <button id="loginBtn">Login</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBawM0KxcmEWXKsvSHa1eOVYtgDVFRMJbU",
  authDomain: "myra-31cce.firebaseapp.com",
  projectId: "myra-31cce",
  storageBucket: "myra-31cce.firebasestorage.app",
  messagingSenderId: "300225625899",
  appId: "1:300225625899:web:a73573c059d3b23d46cf6e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const btn = document.getElementById("loginBtn");

btn.addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please enter email and password");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Login successful");

    // redirect to home page
    window.location.href = "index.html";

  } catch (err) {

    // auto signup if user doesn't exist
    if (err.code === "auth/invalid-credential") {
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Account created & logged in");
        window.location.href = "index.html";
      } catch (e) {
        alert(e.message);
      }
    } else {
      alert(err.message);
    }
  }

});

</script>

</body>
</html>
